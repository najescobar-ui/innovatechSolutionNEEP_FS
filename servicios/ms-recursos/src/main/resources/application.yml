server:
  port: 8082

spring:
  application:
    name: ms-recursos
  datasource:
    url: jdbc:postgresql://${DB_RECURSOS_HOST:db-recursos}:5432/${DB_RECURSOS_NAME:recursos}
    username: ${DB_RECURSOS_USER:recursos_user}
    password: ${DB_RECURSOS_PASSWORD:recursos_dev}
  jpa:
    hibernate:
      # Schema is owned by Flyway (src/main/resources/db/migration).
      # Hibernate only checks that the entity matches the live schema.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://eureka-server:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
