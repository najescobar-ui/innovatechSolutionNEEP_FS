server:
  port: 8083

spring:
  application:
    name: ms-analitica
  datasource:
    url: jdbc:postgresql://${DB_ANALITICA_HOST:db-analitica}:${DB_ANALITICA_PORT:5432}/${DB_ANALITICA_NAME:analitica}
    username: ${DB_ANALITICA_USER:analitica_user}
    password: ${DB_ANALITICA_PASSWORD:analitica_dev}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

# snapshots: cadencia configurable. En dev, cada 5 min permite ver evolucion rapido.
innovatech:
  snapshots:
    enabled: ${SNAPSHOTS_ENABLED:true}
    cron: ${SNAPSHOTS_CRON:0 */5 * * * *}
    backfill-weeks: ${SNAPSHOTS_BACKFILL_WEEKS:12}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://eureka-server:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
