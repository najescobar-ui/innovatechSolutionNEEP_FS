server:
  port: 9000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # In Spring Cloud Gateway 5.x the config namespace is split per
      # variant (server-webflux vs server-webmvc). The old
      # `spring.cloud.gateway.routes` is silently ignored.
      server:
        webflux:
          discovery:
            locator:
              # Prefer explicit routes below over auto-locator from service-ids
              enabled: false
          routes:
            - id: bff-route
              uri: lb://bff
              predicates:
                - Path=/api/**
              filters:
                # External `/api/dashboard` becomes `/dashboard` before
                # reaching the BFF, so the BFF doesn't need to know its
                # public prefix.
                - StripPrefix=1
      # TODO[KEYCLOAK]: add a global filter that strips Authorization on
      #   /actuator/** but keeps it on /api/**, once the resource-server
      #   starter is wired.
      # TODO[RATE_LIMIT]: enable RequestRateLimiter (10 req/s per internal docs
      #   §5). Default Spring Cloud Gateway impl needs Redis; decide between
      #   adding Redis to the stack or using an in-memory bucket.

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://eureka-server:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    # Inside docker-net hostnames work, but ip-address is more reliable
    # when containers get recreated.
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
