# Eureka, microservicios de negocio, BFF y API Gateway.
# Imagenes locales (innovatech/*:dev) -> imagePullPolicy IfNotPresent (Docker Desktop comparte el daemon).
# ---------------- eureka-server ----------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
spec:
  replicas: 1
  selector:
    matchLabels: { app: eureka-server }
  template:
    metadata:
      labels: { app: eureka-server }
    spec:
      containers:
        - name: eureka-server
          image: innovatech/eureka-server:dev
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8761 }]
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8761 }
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 20
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
spec:
  selector: { app: eureka-server }
  ports: [{ port: 8761, targetPort: 8761 }]
---
# ---------------- ms-projects ----------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-projects
spec:
  replicas: 1
  selector:
    matchLabels: { app: ms-projects }
  template:
    metadata:
      labels: { app: ms-projects }
    spec:
      containers:
        - name: ms-projects
          image: innovatech/ms-projects:dev
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8081 }]
          env:
            - { name: EUREKA_DEFAULT_ZONE, valueFrom: { configMapKeyRef: { name: innovatech-config, key: EUREKA_DEFAULT_ZONE } } }
            - { name: DB_PROJECTS_HOST, valueFrom: { configMapKeyRef: { name: innovatech-config, key: DB_PROJECTS_HOST } } }
            - { name: DB_PROJECTS_NAME, valueFrom: { configMapKeyRef: { name: innovatech-config, key: DB_PROJECTS_NAME } } }
            - { name: DB_PROJECTS_USER, valueFrom: { configMapKeyRef: { name: innovatech-config, key: DB_PROJECTS_USER } } }
            - { name: DB_PROJECTS_PASSWORD, valueFrom: { secretKeyRef: { name: innovatech-secrets, key: DB_PROJECTS_PASSWORD } } }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8081 }
            initialDelaySeconds: 35
            periodSeconds: 10
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ms-projects
spec:
  selector: { app: ms-projects }
  ports: [{ port: 8081, targetPort: 8081 }]
---
