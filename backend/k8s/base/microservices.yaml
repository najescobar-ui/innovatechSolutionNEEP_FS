# ---------------- bff ----------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
spec:
  replicas: 1
  selector:
    matchLabels: { app: bff }
  template:
    metadata:
      labels: { app: bff }
    spec:
      containers:
        - name: bff
          image: innovatech/bff:dev
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8084 }]
          env:
            - { name: EUREKA_DEFAULT_ZONE, valueFrom: { configMapKeyRef: { name: innovatech-config, key: EUREKA_DEFAULT_ZONE } } }
            - { name: KEYCLOAK_JWK_URI, valueFrom: { configMapKeyRef: { name: innovatech-config, key: KEYCLOAK_JWK_URI } } }
            - { name: KEYCLOAK_ADMIN_URL, valueFrom: { configMapKeyRef: { name: innovatech-config, key: KEYCLOAK_ADMIN_URL } } }
            - { name: KEYCLOAK_REALM, valueFrom: { configMapKeyRef: { name: innovatech-config, key: KEYCLOAK_REALM } } }
            - { name: KEYCLOAK_ADMIN, valueFrom: { secretKeyRef: { name: innovatech-secrets, key: KEYCLOAK_ADMIN } } }
            - { name: KEYCLOAK_ADMIN_PASSWORD, valueFrom: { secretKeyRef: { name: innovatech-secrets, key: KEYCLOAK_ADMIN_PASSWORD } } }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8084 }
            initialDelaySeconds: 35
            periodSeconds: 10
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: bff
spec:
  selector: { app: bff }
  ports: [{ port: 8084, targetPort: 8084 }]
---
# ---------------- api-gateway (LoadBalancer -> localhost:9000) ----------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
    spec:
      containers:
        - name: api-gateway
          image: innovatech/api-gateway:dev
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 9000 }]
          env:
            - { name: EUREKA_DEFAULT_ZONE, valueFrom: { configMapKeyRef: { name: innovatech-config, key: EUREKA_DEFAULT_ZONE } } }
            - { name: KEYCLOAK_JWK_URI, valueFrom: { configMapKeyRef: { name: innovatech-config, key: KEYCLOAK_JWK_URI } } }
            - { name: CORS_ALLOWED_ORIGINS, value: "http://localhost:3000" }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 9000 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: LoadBalancer
  selector: { app: api-gateway }
  ports: [{ port: 9000, targetPort: 9000 }]
