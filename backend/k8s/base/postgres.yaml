# ---------------- db-keycloak ----------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-keycloak-pvc
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-keycloak
spec:
  replicas: 1
  selector:
    matchLabels: { app: db-keycloak }
  template:
    metadata:
      labels: { app: db-keycloak }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_DB, value: "keycloak" }
            - { name: POSTGRES_USER, valueFrom: { configMapKeyRef: { name: innovatech-config, key: KC_DB_USERNAME } } }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: innovatech-secrets, key: KC_DB_PASSWORD } } }
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "keycloak", "-d", "keycloak"] }
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: db-keycloak-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: db-keycloak
spec:
  selector: { app: db-keycloak }
  ports: [{ port: 5432, targetPort: 5432 }]
