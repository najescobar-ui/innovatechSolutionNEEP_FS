# Database per Service: una PostgreSQL por microservicio + la de Keycloak.
# Cada base es un StatefulSet (carga con estado): identidad estable, arranque
# ordenado y un PersistentVolume propio gestionado por volumeClaimTemplates.
# Cada StatefulSet usa su Service headless (clusterIP: None) como serviceName.
# ---------------- db-projects ----------------
apiVersion: v1
kind: Service
metadata:
  name: db-projects
spec:
  clusterIP: None
  selector: { app: db-projects }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-projects
spec:
  serviceName: db-projects
  replicas: 1
  selector:
    matchLabels: { app: db-projects }
  template:
    metadata:
      labels: { app: db-projects }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_DB, valueFrom: { configMapKeyRef: { name: innovatech-config, key: DB_PROJECTS_NAME } } }
            - { name: POSTGRES_USER, valueFrom: { configMapKeyRef: { name: innovatech-config, key: DB_PROJECTS_USER } } }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: innovatech-secrets, key: DB_PROJECTS_PASSWORD } } }
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "projects_user", "-d", "projects"] }
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
