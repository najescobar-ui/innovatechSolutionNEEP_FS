# Database per Service: una PostgreSQL por microservicio + la de Keycloak.
# ---------------- db-projects ----------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-projects-pvc
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-projects
spec:
  replicas: 1
  selector:
    matchLabels: { app: db-projects }
  template:
    metadata:
      labels: { app: db-projects }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_DB, valueFrom: { configMapKeyRef: { name: innovatech-config, key: DB_PROJECTS_NAME } } }
            - { name: POSTGRES_USER, valueFrom: { configMapKeyRef: { name: innovatech-config, key: DB_PROJECTS_USER } } }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: innovatech-secrets, key: DB_PROJECTS_PASSWORD } } }
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "projects_user", "-d", "projects"] }
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: db-projects-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: db-projects
spec:
  selector: { app: db-projects }
  ports: [{ port: 5432, targetPort: 5432 }]
---
