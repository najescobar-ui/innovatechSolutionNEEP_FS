# Expone el frontend via Ingress (ingress-nginx). En Docker Desktop el controller
# se publica en localhost:80, y *.localhost resuelve a 127.0.0.1, asi que el front
# queda en http://innovatech.localhost
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
spec:
  ingressClassName: nginx
  rules:
    - host: innovatech.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
