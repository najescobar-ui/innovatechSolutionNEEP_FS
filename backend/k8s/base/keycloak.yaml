apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  replicas: 1
  selector:
    matchLabels: { app: keycloak }
  template:
    metadata:
      labels: { app: keycloak }
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0
          args: ["start-dev", "--import-realm"]
          ports: [{ containerPort: 8080 }]
          env:
            - { name: KEYCLOAK_ADMIN, valueFrom: { secretKeyRef: { name: innovatech-secrets, key: KEYCLOAK_ADMIN } } }
            - { name: KEYCLOAK_ADMIN_PASSWORD, valueFrom: { secretKeyRef: { name: innovatech-secrets, key: KEYCLOAK_ADMIN_PASSWORD } } }
            - { name: KC_DB, value: "postgres" }
            - { name: KC_DB_URL, value: "jdbc:postgresql://db-keycloak:5432/keycloak" }
            - { name: KC_DB_USERNAME, valueFrom: { configMapKeyRef: { name: innovatech-config, key: KC_DB_USERNAME } } }
            - { name: KC_DB_PASSWORD, valueFrom: { secretKeyRef: { name: innovatech-secrets, key: KC_DB_PASSWORD } } }
            - { name: KC_HOSTNAME_STRICT, value: "false" }
            - { name: KC_HTTP_ENABLED, value: "true" }
            - { name: KC_HEALTH_ENABLED, value: "true" }
          volumeMounts:
            - { name: realm, mountPath: /opt/keycloak/data/import }
          readinessProbe:
            httpGet: { path: /realms/master, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
      volumes:
        - name: realm
          configMap:
            name: keycloak-realm
---
# LoadBalancer: en Docker Desktop el front del navegador llega a localhost:8080.
apiVersion: v1
kind: Service
metadata:
  name: keycloak
spec:
  type: LoadBalancer
  selector: { app: keycloak }
  ports: [{ port: 8080, targetPort: 8080 }]
