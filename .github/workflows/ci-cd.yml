name: CI/CD - Build, Push & Deploy

# ---------------------------------------------------------------------------
# Estrategia:
#   - push a main      -> construye TODAS las imagenes y las publica (latest + sha)
#   - tag vX.Y.Z       -> ademas publica tags semanticos (1.2.3, 1.2, 1)
#   - push a deploy    -> construye, publica Y DESPLIEGA por SSH a EC2 (db + backend)
#   - pull_request     -> SOLO construye (valida que compila), NO publica
#   - manual           -> workflow_dispatch para correrlo a mano
#
# Secrets requeridos (Settings > Secrets and variables > Actions):
#   EC2_SSH_KEY       contenido completo de labsuser.pem (BEGIN...END)
#   EC2_SSH_USER      ec2-user
#   EC2_BACKEND_HOST  IP publica de la instancia backend
#   EC2_DB_HOST       IP publica de la instancia db
#   DOCKERHUB_TOKEN   access token de Docker Hub
# Variables requeridas:
#   DOCKERHUB_USERNAME  jamonimus
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main, deploy]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================================
  # JOB 1 - Build & Push de las 7 imagenes (matriz)
  # =========================================================================
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: innovatech-eureka-server
            context: .
            dockerfile: eureka-server/Dockerfile
          - image: innovatech-ms-proyectos
            context: .
            dockerfile: servicios/ms-proyectos/Dockerfile
          - image: innovatech-ms-recursos
            context: .
            dockerfile: servicios/ms-recursos/Dockerfile
          - image: innovatech-ms-analitica
            context: .
            dockerfile: servicios/ms-analitica/Dockerfile
          - image: innovatech-bff
            context: .
            dockerfile: bff/Dockerfile
          - image: innovatech-api-gateway
            context: .
            dockerfile: api-gateway/Dockerfile
          - image: innovatech-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login a Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Metadatos (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/deploy' }}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build & Push - ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # =========================================================================
  # JOB 2 - Deploy automatico a EC2 (SOLO en push a la rama `deploy`)
  # =========================================================================
  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/deploy'

    steps:
      - name: Preparar llave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_DB_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          ssh-keyscan -H ${{ secrets.EC2_BACKEND_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy DB
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_SSH_USER }}@${{ secrets.EC2_DB_HOST }} '
            cd ~/innovatech &&
            docker compose -f docker-compose.db.yml pull &&
            docker compose -f docker-compose.db.yml up -d &&
            docker compose -f docker-compose.db.yml ps
          '

      - name: Deploy Backend
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_SSH_USER }}@${{ secrets.EC2_BACKEND_HOST }} '
            cd ~/innovatech &&
            docker compose -f docker-compose.backend.yml pull &&
            docker compose -f docker-compose.backend.yml up -d --force-recreate &&
            docker compose -f docker-compose.backend.yml ps
          '

      - name: Limpiar llave
        if: always()
        run: rm -f ~/.ssh/deploy_key
