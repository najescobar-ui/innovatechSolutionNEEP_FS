# Stack de DESPLIEGUE de Innovatech Solutions.
#
# A diferencia de docker-compose.yml (que CONSTRUYE las imagenes con build:),
# este archivo solo CONSUME imagenes ya publicadas en Docker Hub. Es el patron
# "build once, deploy anywhere": el pipeline de CI construye y versiona una vez,
# y cualquier entorno despliega ese mismo artefacto inmutable sin recompilar.
#
# Uso:
#   export DOCKERHUB_USERNAME=tu_usuario
#   export TAG=latest                 # o sha-abc1234, o 1.2.3
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Variables (con defaults dev embebidos):
#   DOCKERHUB_USERNAME  namespace de Docker Hub (obligatorio)
#   TAG                 version de imagen a desplegar (default: latest)

networks:
  innovatech-net:
    name: innovatech-net
    driver: bridge

volumes:
  pgdata-projects: { name: pgdata-projects }
  pgdata-resources: { name: pgdata-resources }
  pgdata-analytics: { name: pgdata-analytics }
  pgdata-keycloak: { name: pgdata-keycloak }

services:
  # ---- Service Discovery ----
  eureka-server:
    image: ${DOCKERHUB_USERNAME}/innovatech-eureka-server:${TAG:-latest}
    container_name: eureka-server
    networks: [innovatech-net]
    ports: ["8761:8761"]
    restart: unless-stopped

  # ---- Auth ----
  db-keycloak:
    image: postgres:16
    container_name: db-keycloak
    networks: [innovatech-net]
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USERNAME:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak_dev}
    volumes:
      - pgdata-keycloak:/var/lib/postgresql/data
    ports: ["5435:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USERNAME:-keycloak} -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    networks: [innovatech-net]
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db-keycloak:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak_dev}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./backend/docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports: ["8080:8080"]
    depends_on:
      db-keycloak:
        condition: service_healthy
    restart: unless-stopped

  # ---- BD por microservicio ----
  db-projects:
    image: postgres:16
    container_name: db-projects
    networks: [innovatech-net]
    environment:
      POSTGRES_DB: ${DB_PROJECTS_NAME:-projects}
      POSTGRES_USER: ${DB_PROJECTS_USER:-projects_user}
      POSTGRES_PASSWORD: ${DB_PROJECTS_PASSWORD:-projects_dev}
    volumes:
      - pgdata-projects:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_PROJECTS_USER:-projects_user} -d ${DB_PROJECTS_NAME:-projects}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  db-resources:
    image: postgres:16
    container_name: db-resources
    networks: [innovatech-net]
    environment:
      POSTGRES_DB: ${DB_RESOURCES_NAME:-resources}
      POSTGRES_USER: ${DB_RESOURCES_USER:-resources_user}
      POSTGRES_PASSWORD: ${DB_RESOURCES_PASSWORD:-resources_dev}
    volumes:
      - pgdata-resources:/var/lib/postgresql/data
    ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_RESOURCES_USER:-resources_user} -d ${DB_RESOURCES_NAME:-resources}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  db-analytics:
    image: postgres:16
    container_name: db-analytics
    networks: [innovatech-net]
    environment:
      POSTGRES_DB: ${DB_ANALYTICS_NAME:-analytics}
      POSTGRES_USER: ${DB_ANALYTICS_USER:-analytics_user}
      POSTGRES_PASSWORD: ${DB_ANALYTICS_PASSWORD:-analytics_dev}
    volumes:
      - pgdata-analytics:/var/lib/postgresql/data
    ports: ["5434:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_ANALYTICS_USER:-analytics_user} -d ${DB_ANALYTICS_NAME:-analytics}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---- Microservicios de negocio ----
  ms-projects:
    image: ${DOCKERHUB_USERNAME}/innovatech-ms-projects:${TAG:-latest}
    container_name: ms-projects
    networks: [innovatech-net]
    ports: ["8081:8081"]
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      DB_PROJECTS_HOST: db-projects
      DB_PROJECTS_NAME: ${DB_PROJECTS_NAME:-projects}
      DB_PROJECTS_USER: ${DB_PROJECTS_USER:-projects_user}
      DB_PROJECTS_PASSWORD: ${DB_PROJECTS_PASSWORD:-projects_dev}
    depends_on:
      eureka-server:
        condition: service_started
      db-projects:
        condition: service_healthy
    restart: unless-stopped

  ms-resources:
    image: ${DOCKERHUB_USERNAME}/innovatech-ms-resources:${TAG:-latest}
    container_name: ms-resources
    networks: [innovatech-net]
    ports: ["8082:8082"]
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      DB_RESOURCES_HOST: db-resources
      DB_RESOURCES_NAME: ${DB_RESOURCES_NAME:-resources}
      DB_RESOURCES_USER: ${DB_RESOURCES_USER:-resources_user}
      DB_RESOURCES_PASSWORD: ${DB_RESOURCES_PASSWORD:-resources_dev}
    depends_on:
      eureka-server:
        condition: service_started
      db-resources:
        condition: service_healthy
    restart: unless-stopped

  ms-analytics:
    image: ${DOCKERHUB_USERNAME}/innovatech-ms-analytics:${TAG:-latest}
    container_name: ms-analytics
    networks: [innovatech-net]
    ports: ["8083:8083"]
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      DB_ANALYTICS_HOST: db-analytics
      DB_ANALYTICS_NAME: ${DB_ANALYTICS_NAME:-analytics}
      DB_ANALYTICS_USER: ${DB_ANALYTICS_USER:-analytics_user}
      DB_ANALYTICS_PASSWORD: ${DB_ANALYTICS_PASSWORD:-analytics_dev}
      SNAPSHOTS_ENABLED: ${SNAPSHOTS_ENABLED:-true}
      SNAPSHOTS_CRON: ${SNAPSHOTS_CRON:-0 */5 * * * *}
      SNAPSHOTS_BACKFILL_WEEKS: ${SNAPSHOTS_BACKFILL_WEEKS:-12}
    depends_on:
      eureka-server:
        condition: service_started
      db-analytics:
        condition: service_healthy
    restart: unless-stopped

  # ---- BFF ----
  bff:
    image: ${DOCKERHUB_USERNAME}/innovatech-bff:${TAG:-latest}
    container_name: bff
    networks: [innovatech-net]
    ports: ["8084:8084"]
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
    restart: unless-stopped

  # ---- API Gateway ----
  api-gateway:
    image: ${DOCKERHUB_USERNAME}/innovatech-api-gateway:${TAG:-latest}
    container_name: api-gateway
    networks: [innovatech-net]
    ports: ["9000:9000"]
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
    restart: unless-stopped

  # ---- Frontend ----
  # OJO: las VITE_* se hornean en build-time dentro de la imagen. La imagen
  # publicada ya trae los defaults (localhost). Si necesitas otros valores
  # para el entorno destino, hay que reconstruir con esos build-args.
  frontend:
    image: ${DOCKERHUB_USERNAME}/innovatech-frontend:${TAG:-latest}
    container_name: frontend
    networks: [innovatech-net]
    ports: ["3000:8080"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      api-gateway:
        condition: service_started
      keycloak:
        condition: service_started
    restart: unless-stopped
