# Stack local de Innovatech Solutions.
#
# Comandos rapidos:
#   docker compose up -d                  # Levanta todo (build si la imagen no existe)
#   docker compose up -d --build          # Fuerza rebuild
#   docker compose ps                     # Estado de los contenedores
#   docker compose logs -f api-gateway    # Logs en vivo de un servicio
#   docker compose down                   # Para y elimina contenedores (preserva volumenes)
#   docker compose down -v                # +elimina volumenes (BORRA datos de las BD)
#
# Variables: se leen de ./.env si existe, con defaults dev embebidos.

networks:
  innovatech-net:
    name: innovatech-net
    driver: bridge

volumes:
  pgdata-proyectos:
    name: pgdata-proyectos
  pgdata-recursos:
    name: pgdata-recursos
  pgdata-analitica:
    name: pgdata-analitica
  pgdata-keycloak:
    name: pgdata-keycloak

services:
  # ------------------------------------------------------------------
  # Service Discovery
  # ------------------------------------------------------------------
  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    image: innovatech/eureka-server:dev
    container_name: eureka-server
    networks: [innovatech-net]
    ports:
      - "8761:8761"
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Auth: Keycloak con su PostgreSQL dedicado.
  # Realm pre-cargado desde docker/keycloak/realm-export.json (-import-realm).
  # ------------------------------------------------------------------
  db-keycloak:
    image: postgres:16
    container_name: db-keycloak
    networks: [innovatech-net]
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USERNAME:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak_dev}
    volumes:
      - pgdata-keycloak:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USERNAME:-keycloak} -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    networks: [innovatech-net]
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db-keycloak:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak_dev}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8080:8080"
    depends_on:
      db-keycloak:
        condition: service_healthy
    restart: unless-stopped

  # ------------------------------------------------------------------
  # BD: una PostgreSQL por microservicio (Database per Service, §5.1)
  # ------------------------------------------------------------------
  db-proyectos:
    image: postgres:16
    container_name: db-proyectos
    networks: [innovatech-net]
    environment:
      POSTGRES_DB: ${DB_PROYECTOS_NAME:-proyectos}
      POSTGRES_USER: ${DB_PROYECTOS_USER:-proyectos_user}
      POSTGRES_PASSWORD: ${DB_PROYECTOS_PASSWORD:-proyectos_dev}
    volumes:
      - pgdata-proyectos:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_PROYECTOS_USER:-proyectos_user} -d ${DB_PROYECTOS_NAME:-proyectos}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  db-recursos:
    image: postgres:16
    container_name: db-recursos
    networks: [innovatech-net]
    environment:
      POSTGRES_DB: ${DB_RECURSOS_NAME:-recursos}
      POSTGRES_USER: ${DB_RECURSOS_USER:-recursos_user}
      POSTGRES_PASSWORD: ${DB_RECURSOS_PASSWORD:-recursos_dev}
    volumes:
      - pgdata-recursos:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_RECURSOS_USER:-recursos_user} -d ${DB_RECURSOS_NAME:-recursos}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  db-analitica:
    image: postgres:16
    container_name: db-analitica
    networks: [innovatech-net]
    environment:
      POSTGRES_DB: ${DB_ANALITICA_NAME:-analitica}
      POSTGRES_USER: ${DB_ANALITICA_USER:-analitica_user}
      POSTGRES_PASSWORD: ${DB_ANALITICA_PASSWORD:-analitica_dev}
    volumes:
      - pgdata-analitica:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_ANALITICA_USER:-analitica_user} -d ${DB_ANALITICA_NAME:-analitica}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Microservicios de negocio
  # ------------------------------------------------------------------
  ms-proyectos:
    build:
      context: .
      dockerfile: servicios/ms-proyectos/Dockerfile
    image: innovatech/ms-proyectos:dev
    container_name: ms-proyectos
    networks: [innovatech-net]
    ports:
      - "8081:8081"
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      DB_PROYECTOS_HOST: db-proyectos
      DB_PROYECTOS_NAME: ${DB_PROYECTOS_NAME:-proyectos}
      DB_PROYECTOS_USER: ${DB_PROYECTOS_USER:-proyectos_user}
      DB_PROYECTOS_PASSWORD: ${DB_PROYECTOS_PASSWORD:-proyectos_dev}
    depends_on:
      eureka-server:
        condition: service_started
      db-proyectos:
        condition: service_healthy
    restart: unless-stopped

  ms-recursos:
    build:
      context: .
      dockerfile: servicios/ms-recursos/Dockerfile
    image: innovatech/ms-recursos:dev
    container_name: ms-recursos
    networks: [innovatech-net]
    ports:
      - "8082:8082"
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      DB_RECURSOS_HOST: db-recursos
      DB_RECURSOS_NAME: ${DB_RECURSOS_NAME:-recursos}
      DB_RECURSOS_USER: ${DB_RECURSOS_USER:-recursos_user}
      DB_RECURSOS_PASSWORD: ${DB_RECURSOS_PASSWORD:-recursos_dev}
    depends_on:
      eureka-server:
        condition: service_started
      db-recursos:
        condition: service_healthy
    restart: unless-stopped

  ms-analitica:
    build:
      context: .
      dockerfile: servicios/ms-analitica/Dockerfile
    image: innovatech/ms-analitica:dev
    container_name: ms-analitica
    networks: [innovatech-net]
    ports:
      - "8083:8083"
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      DB_ANALITICA_HOST: db-analitica
      DB_ANALITICA_NAME: ${DB_ANALITICA_NAME:-analitica}
      DB_ANALITICA_USER: ${DB_ANALITICA_USER:-analitica_user}
      DB_ANALITICA_PASSWORD: ${DB_ANALITICA_PASSWORD:-analitica_dev}
      SNAPSHOTS_ENABLED: ${SNAPSHOTS_ENABLED:-true}
      SNAPSHOTS_CRON: ${SNAPSHOTS_CRON:-0 */5 * * * *}
      SNAPSHOTS_BACKFILL_WEEKS: ${SNAPSHOTS_BACKFILL_WEEKS:-12}
    depends_on:
      eureka-server:
        condition: service_started
      db-analitica:
        condition: service_healthy
    restart: unless-stopped

  # ------------------------------------------------------------------
  # BFF (orquesta, no persiste)
  # ------------------------------------------------------------------
  bff:
    build:
      context: .
      dockerfile: bff/Dockerfile
    image: innovatech/bff:dev
    container_name: bff
    networks: [innovatech-net]
    ports:
      - "8084:8084"
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
    restart: unless-stopped

  # ------------------------------------------------------------------
  # API Gateway (punto unico de entrada)
  # ------------------------------------------------------------------
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: innovatech/api-gateway:dev
    container_name: api-gateway
    networks: [innovatech-net]
    ports:
      - "9000:9000"
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Frontend (React + Vite, build estatico servido por nginx).
  # Las VITE_* se inyectan como build ARGs: el bundle corre en el
  # navegador del host, por eso apuntan a localhost (no a hostnames
  # internos de la red docker).
  # ------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:9000/api}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8080}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-innovatech}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-innovatech-frontend}
    image: innovatech/frontend:dev
    container_name: frontend
    networks: [innovatech-net]
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      api-gateway:
        condition: service_started
      keycloak:
        condition: service_started
    restart: unless-stopped

