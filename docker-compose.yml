# Stack local de Innovatech Solutions.
#
# Comandos rapidos:
#   docker compose up -d                  # Levanta todo (build si la imagen no existe)
#   docker compose up -d --build          # Fuerza rebuild
#   docker compose ps                     # Estado de los contenedores
#   docker compose logs -f api-gateway    # Logs en vivo de un servicio
#   docker compose down                   # Para y elimina contenedores (preserva volumenes)
#   docker compose down -v                # +elimina volumenes (BORRA datos de las BD)
#
# Variables: se leen de ./.env si existe, con defaults dev embebidos.

networks:
  innovatech-net:
    name: innovatech-net
    driver: bridge

volumes:
  pgdata-projects:
    name: pgdata-projects
  pgdata-resources:
    name: pgdata-resources
  pgdata-analytics:
    name: pgdata-analytics
  pgdata-keycloak:
    name: pgdata-keycloak

services:
  # ------------------------------------------------------------------
  # Service Discovery
  # ------------------------------------------------------------------
  eureka-server:
    build:
      context: ./backend
      dockerfile: eureka-server/Dockerfile
    image: innovatech/eureka-server:dev
    container_name: eureka-server
    networks: [innovatech-net]
    ports:
      - "8761:8761"
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Auth: Keycloak con su PostgreSQL dedicado.
  # Realm pre-cargado desde docker/keycloak/realm-export.json (-import-realm).
  # ------------------------------------------------------------------
  db-keycloak:
    image: postgres:16
    container_name: db-keycloak
    networks: [innovatech-net]
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USERNAME:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak_dev}
    volumes:
      - pgdata-keycloak:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USERNAME:-keycloak} -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    networks: [innovatech-net]
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db-keycloak:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak_dev}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./backend/docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8080:8080"
    depends_on:
      db-keycloak:
        condition: service_healthy
    restart: unless-stopped

  # ------------------------------------------------------------------
  # BD: una PostgreSQL por microservicio (Database per Service, §5.1)
  # ------------------------------------------------------------------
  db-projects:
    image: postgres:16
    container_name: db-projects
    networks: [innovatech-net]
    environment:
      POSTGRES_DB: ${DB_PROJECTS_NAME:-projects}
      POSTGRES_USER: ${DB_PROJECTS_USER:-projects_user}
      POSTGRES_PASSWORD: ${DB_PROJECTS_PASSWORD:-projects_dev}
    volumes:
      - pgdata-projects:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_PROJECTS_USER:-projects_user} -d ${DB_PROJECTS_NAME:-projects}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  db-resources:
    image: postgres:16
    container_name: db-resources
    networks: [innovatech-net]
    environment:
      POSTGRES_DB: ${DB_RESOURCES_NAME:-resources}
      POSTGRES_USER: ${DB_RESOURCES_USER:-resources_user}
      POSTGRES_PASSWORD: ${DB_RESOURCES_PASSWORD:-resources_dev}
    volumes:
      - pgdata-resources:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_RESOURCES_USER:-resources_user} -d ${DB_RESOURCES_NAME:-resources}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  db-analytics:
    image: postgres:16
    container_name: db-analytics
    networks: [innovatech-net]
    environment:
      POSTGRES_DB: ${DB_ANALYTICS_NAME:-analytics}
      POSTGRES_USER: ${DB_ANALYTICS_USER:-analytics_user}
      POSTGRES_PASSWORD: ${DB_ANALYTICS_PASSWORD:-analytics_dev}
    volumes:
      - pgdata-analytics:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_ANALYTICS_USER:-analytics_user} -d ${DB_ANALYTICS_NAME:-analytics}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Microservicios de negocio
  # ------------------------------------------------------------------
  ms-projects:
    build:
      context: ./backend
      dockerfile: services/ms-projects/Dockerfile
    image: innovatech/ms-projects:dev
    container_name: ms-projects
    networks: [innovatech-net]
    ports:
      - "8081:8081"
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      DB_PROJECTS_HOST: db-projects
      DB_PROJECTS_NAME: ${DB_PROJECTS_NAME:-projects}
      DB_PROJECTS_USER: ${DB_PROJECTS_USER:-projects_user}
      DB_PROJECTS_PASSWORD: ${DB_PROJECTS_PASSWORD:-projects_dev}
    depends_on:
      eureka-server:
        condition: service_started
      db-projects:
        condition: service_healthy
    restart: unless-stopped

  ms-resources:
    build:
      context: ./backend
      dockerfile: services/ms-resources/Dockerfile
    image: innovatech/ms-resources:dev
    container_name: ms-resources
    networks: [innovatech-net]
    ports:
      - "8082:8082"
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      DB_RESOURCES_HOST: db-resources
      DB_RESOURCES_NAME: ${DB_RESOURCES_NAME:-resources}
      DB_RESOURCES_USER: ${DB_RESOURCES_USER:-resources_user}
      DB_RESOURCES_PASSWORD: ${DB_RESOURCES_PASSWORD:-resources_dev}
    depends_on:
      eureka-server:
        condition: service_started
      db-resources:
        condition: service_healthy
    restart: unless-stopped

  ms-analytics:
    build:
      context: ./backend
      dockerfile: services/ms-analytics/Dockerfile
    image: innovatech/ms-analytics:dev
    container_name: ms-analytics
    networks: [innovatech-net]
    ports:
      - "8083:8083"
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      DB_ANALYTICS_HOST: db-analytics
      DB_ANALYTICS_NAME: ${DB_ANALYTICS_NAME:-analytics}
      DB_ANALYTICS_USER: ${DB_ANALYTICS_USER:-analytics_user}
      DB_ANALYTICS_PASSWORD: ${DB_ANALYTICS_PASSWORD:-analytics_dev}
      SNAPSHOTS_ENABLED: ${SNAPSHOTS_ENABLED:-true}
      SNAPSHOTS_CRON: ${SNAPSHOTS_CRON:-0 */5 * * * *}
      SNAPSHOTS_BACKFILL_WEEKS: ${SNAPSHOTS_BACKFILL_WEEKS:-12}
    depends_on:
      eureka-server:
        condition: service_started
      db-analytics:
        condition: service_healthy
    restart: unless-stopped

  # ------------------------------------------------------------------
  # BFF (orquesta, no persiste)
  # ------------------------------------------------------------------
  bff:
    build:
      context: ./backend
      dockerfile: bff/Dockerfile
    image: innovatech/bff:dev
    container_name: bff
    networks: [innovatech-net]
    ports:
      - "8084:8084"
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
    restart: unless-stopped

  # ------------------------------------------------------------------
  # API Gateway (punto unico de entrada)
  # ------------------------------------------------------------------
  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    image: innovatech/api-gateway:dev
    container_name: api-gateway
    networks: [innovatech-net]
    ports:
      - "9000:9000"
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Frontend (React + Vite, build estatico servido por nginx).
  # Las VITE_* se inyectan como build ARGs: el bundle corre en el
  # navegador del host, por eso apuntan a localhost (no a hostnames
  # internos de la red docker).
  # ------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:9000/api}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8080}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-innovatech}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-innovatech-frontend}
    image: innovatech/frontend:dev
    container_name: frontend
    networks: [innovatech-net]
    ports:
      - "3000:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      api-gateway:
        condition: service_started
      keycloak:
        condition: service_started
    restart: unless-stopped

